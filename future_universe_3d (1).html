<style>

scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 15;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });

const starVertices = [];
for (let i = 0; i < 1000; i++) {
  const x = (Math.random() - 0.5) * 100;
  const y = (Math.random() - 0.5) * 100;
  const z = (Math.random() - 0.5) * 100;
  starVertices.push(x, y, z);
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

  // 사회 이슈
  { name: '환경보호', type: 'node', pos: [2, -7, 0], color: 0x1D9E75, size: 0.55 },
  { name: '기후위기', type: 'node', pos: [0, -4, -4], color: 0x0F6E56, size: 0.5 },
  { name: '사회혁신', type: 'node', pos: [6, 1, 2], color: 0x378ADD, size: 0.5 },
  { name: '교육', type: 'node', pos: [4, 5, 1], color: 0xFA9F27, size: 0.5 },
  
  // 취미/관심사
  { name: 'SF 독서', type: 'node', pos: [6, 6, -3], color: 0xD4537E, size: 0.4 },
  { name: '등산', type: 'node', pos: [-8, -6, 0], color: 0x639922, size: 0.35 },
  { name: '요리', type: 'node', pos: [9, -3, 3], color: 0xBA7517, size: 0.35 },

// 연결선 데이터 (전문가 인덱스: 0-9, 노드 인덱스: 10-27)
const connections = [
  // 김서준 교수(0) - 양자물리학자
  [0, 10], [0, 11], [0, 17], [0, 18], [0, 24], // 양자역학, AI, 과학커뮤니케이션, 대중강연, SF독서

  [1, 13], [1, 17], [1, 24], [1, 14], [1, 19], // 글쓰기, 과학커뮤니케이션, SF독서, 영상제작, 저널리즘
  
  // 이준호 크리에이터(2) - 과학 유튜버
  [2, 11], [2, 14], [2, 17], [2, 20], [2, 21], // AI, 영상제작, 과학커뮤니케이션, 환경보호, 기후위기
  
  // 최유진 디자이너(3) - UX/UI
  [3, 16], [3, 11], [3, 12], [3, 15], [3, 22], // 디자인, AI, 데이터분석, 사진, 사회혁신
  
  // 정현우 감독(4) - 다큐멘터리
  [4, 14], [4, 20], [4, 21], [4, 15], [4, 19], [4, 25], // 영상제작, 환경보호, 기후위기, 사진, 저널리즘, 등산
  
  // 강민수 대표(5) - 소셜벤처
  [5, 22], [5, 23], [5, 18], [5, 13], // 사회혁신, 교육, 대중강연, 글쓰기
  
  // 한지영 변호사(6) - 환경법
  [6, 20], [6, 21], [6, 22], [6, 13], [6, 19], // 환경보호, 기후위기, 사회혁신, 글쓰기, 저널리즘
  
  // 서민재 PD(7) - 교육 콘텐츠
  [7, 14], [7, 23], [7, 17], [7, 18], [7, 27], // 영상제작, 교육, 과학커뮤니케이션, 대중강연, 음악
  
  // 윤서아 기자(8) - 과학 전문기자
  [8, 19], [8, 17], [8, 21], [8, 20], [8, 13], // 저널리즘, 과학커뮤니케이션, 기후위기, 환경보호, 글쓰기
  
  // 임동훈 연구원(9) - AI 의료
  [9, 11], [9, 12], [9, 22], [9, 26], // AI, 데이터분석, 사회혁신, 요리
  
  // 노드 간 연결 (관련성 높은 것들)
  [11, 12], // AI - 데이터분석
  [17, 18], // 과학커뮤니케이션 - 대중강연
  [17, 19], // 과학커뮤니케이션 - 저널리즘
  [20, 21], // 환경보호 - 기후위기
  [14, 15], // 영상제작 - 사진
  [13, 19], // 글쓰기 - 저널리즘
  [22, 23], // 사회혁신 - 교육
];

// 별 모양 geometry 생성 함수
function createStarGeometry(size) {
  const vertices = [];
  const outerRadius = size;
  const innerRadius = size * 0.4;
  const points = 5;
  
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI / points) * i;
    const radius = i % 2 === 0 ? outerRadius : innerRadius;
    
    // 3D 별을 위해 앞뒤 면 생성
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    vertices.push(x, y, 0.1);
    vertices.push(x, y, -0.1);
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  
  const indices = [];
  for (let i = 0; i < points * 2; i++) {
    const next = (i + 1) % (points * 2);
    indices.push(i * 2, next * 2, i * 2 + 1);
    indices.push(next * 2, next * 2 + 1, i * 2 + 1);
  }
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  
  return geometry;
}

// 노드 메쉬 생성
const nodeMeshes = [];
const nodeLabels = [];

nodes.forEach((node, idx) => {
  let geometry;
  
  // 전문가는 별 모양, 노드는 구체
  if (node.type === 'expert') {
    geometry = createStarGeometry(node.size);
  } else {
    geometry = new THREE.SphereGeometry(node.size, 16, 16);
  }
  
  const material = new THREE.MeshPhongMaterial({ 
    color: node.color,
    emissive: node.color,
    emissiveIntensity: node.type === 'expert' ? 0.6 : 0.3,
    shininess: 30
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(node.pos[0], node.pos[1], node.pos[2]);
  mesh.userData = { index: idx, name: node.name, desc: node.desc, type: node.type };
  scene.add(mesh);
  nodeMeshes.push(mesh);
  
  // 라벨 생성
  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = node.name;
  label.style.display = 'none';
  document.body.appendChild(label);
  nodeLabels.push(label);
});

// 연결선 생성
const connectionLines = [];
connections.forEach(([from, to]) => {
  const points = [
    new THREE.Vector3(...nodes[from].pos),
    new THREE.Vector3(...nodes[to].pos)
  ];
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ 
    color: 0x666666, 
    opacity: 0.3, 
    transparent: true,
    linewidth: 1
  });
  const line = new THREE.Line(geometry, material);
  line.userData = { from: from, to: to };
  scene.add(line);
  connectionLines.push(line);
});

// 조명
const ambientLight = new THREE.AmbientLight(0x404040, 2);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xffffff, 1, 100);
pointLight1.position.set(10, 10, 10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x4444ff, 0.5, 100);
pointLight2.position.set(-10, -10, -10);
scene.add(pointLight2);

// 마우스 컨트롤
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let rotation = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  previousMousePosition = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    
    rotation.y += deltaX * 0.005;
    rotation.x += deltaY * 0.005;
    
    previousMousePosition = { x: e.clientX, y: e.clientY };
  }
});

renderer.domElement.addEventListener('mouseup', () => {
  isDragging = false;
});

// 줌
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camera.position.z += e.deltaY * 0.01;
  camera.position.z = Math.max(5, Math.min(30, camera.position.z));
});

// 클릭한 노드 추적
const myUniverse = new Set();
let isMyUniverseMode = false;

function updateMyUniversePanel() {
  const container = document.getElementById('clicked-nodes');
  const viewBtn = document.getElementById('view-universe-btn');
  const clearBtn = document.getElementById('clear-universe-btn');
  const stats = document.getElementById('universe-stats');
  
  if (myUniverse.size === 0) {
    container.innerHTML = '<p style="color: #888; font-size: 11px; text-align: center;">노드를 클릭하면 여기에 추가됩니다</p>';
    viewBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    stats.innerHTML = '';
    return;
  }
  
  // 클릭한 노드 목록 표시
  let html = '';
  myUniverse.forEach(idx => {
    const node = nodes[idx];
    if (node.type === 'node') {
      html += `
        <div class="clicked-node-item">
          <span>🌟 ${node.name}</span>
          <button class="remove-btn" onclick="removeFromUniverse(${idx})">✕</button>
        </div>
      `;
    }
  });
  container.innerHTML = html;
  
  viewBtn.style.display = 'block';
  clearBtn.style.display = 'block';
  
  // 연결된 전문가 분석
  const connectedExperts = new Set();
  myUniverse.forEach(nodeIdx => {
    connectionLines.forEach(line => {
      const { from, to } = line.userData;
      if (from === nodeIdx && nodes[to].type === 'expert') {
        connectedExperts.add(to);
      }
      if (to === nodeIdx && nodes[from].type === 'expert') {
        connectedExperts.add(from);
      }
    });
  });
  
  stats.innerHTML = `
    <div>관심 노드: ${myUniverse.size}개</div>
    <div>연결된 전문가: ${connectedExperts.size}명</div>
  `;
}

function removeFromUniverse(idx) {
  myUniverse.delete(idx);
  updateMyUniversePanel();
  if (!isMyUniverseMode) {
    resetHighlight();
  }
}

document.getElementById('clear-universe-btn').addEventListener('click', () => {
  myUniverse.clear();
  updateMyUniversePanel();
  exitMyUniverseMode();
});

document.getElementById('view-universe-btn').addEventListener('click', () => {
  toggleMyUniverseMode();
});

function toggleMyUniverseMode() {
  isMyUniverseMode = !isMyUniverseMode;
  const btn = document.getElementById('view-universe-btn');
  
  if (isMyUniverseMode) {
    btn.textContent = '전체 네트워크 보기 🌐';
    showMyUniverse();
  } else {
    btn.textContent = '내 우주 보기 🚀';
    exitMyUniverseMode();
  }
}

function showMyUniverse() {
  // 모든 노드와 선 숨기기
  nodeMeshes.forEach((mesh, idx) => {
    if (!myUniverse.has(idx)) {
      mesh.visible = false;
      nodeLabels[idx].style.display = 'none';
    } else {
      mesh.material.emissiveIntensity = 1.0;
      mesh.scale.set(1.2, 1.2, 1.2);
    }
  });
  
  connectionLines.forEach(line => {
    const { from, to } = line.userData;
    
    // 내가 클릭한 노드와 전문가를 연결하는 선만 표시
    const fromInUniverse = myUniverse.has(from);
    const toInUniverse = myUniverse.has(to);
    const fromIsExpert = nodes[from].type === 'expert';
    const toIsExpert = nodes[to].type === 'expert';
    
    if ((fromInUniverse && toIsExpert) || (toInUniverse && fromIsExpert) || (fromInUniverse && toInUniverse)) {
      line.visible = true;
      line.material.color.setHex(0xffd700);
      line.material.opacity = 0.8;
      
      // 연결된 전문가 표시
      const expertIdx = fromIsExpert ? from : (toIsExpert ? to : null);
      if (expertIdx !== null) {
        nodeMeshes[expertIdx].visible = true;
        nodeMeshes[expertIdx].material.emissiveIntensity = 0.9;
        nodeMeshes[expertIdx].scale.set(1.1, 1.1, 1.1);
      }
    } else {
      line.visible = false;
    }
  });
  
  document.getElementById('node-info').innerHTML = 
    '<strong>내 우주 모드</strong><br>선택한 노드들과 연결된 전문가들이 표시됩니다';
}

function exitMyUniverseMode() {
  isMyUniverseMode = false;
  
  // 모든 것 다시 표시
  nodeMeshes.forEach(mesh => {
    mesh.visible = true;
  });
  
  connectionLines.forEach(line => {
    line.visible = true;
  });
  
  resetHighlight();
  document.getElementById('node-info').innerHTML = '노드를 클릭해서 상세 정보를 확인하세요';
}

function resetHighlight() {
  nodeMeshes.forEach(m => {
    m.material.emissiveIntensity = m.userData.type === 'expert' ? 0.6 : 0.3;
    m.scale.set(1, 1, 1);
  });
  connectionLines.forEach(line => {
    line.material.color.setHex(0x666666);
    line.material.opacity = 0.3;
  });
}

// 클릭 이벤트
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (isDragging) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  
  if (!isMyUniverseMode) {
    // 일반 모드에서의 클릭
    // 모든 노드와 선을 기본 상태로 리셋
    resetHighlight();
    
    if (intersects.length > 0) {
      const selected = intersects[0].object;
      const data = selected.userData;
      const selectedIdx = data.index;
      
      // 노드만 나만의 우주에 추가 (전문가는 제외)
      if (data.type === 'node') {
        if (myUniverse.has(selectedIdx)) {
          myUniverse.delete(selectedIdx);
        } else {
          myUniverse.add(selectedIdx);
        }
        updateMyUniversePanel();
      }
      
      // 정보 패널 업데이트
      let infoText = data.desc ? 
        `<strong>${data.name}</strong><br>${data.desc}` :
        `<strong>${data.name}</strong><br>이 노드와 연결된 전문가를 탐색하세요`;
      
      // 선택된 노드 강조
      selected.material.emissiveIntensity = 1.2;
      selected.scale.set(1.3, 1.3, 1.3);
      
      // 연결된 노드와 선 찾기
      const connectedIndices = [];
      connectionLines.forEach(line => {
        const { from, to } = line.userData;
        
        if (from === selectedIdx || to === selectedIdx) {
          // 연결된 선 밝게
          line.material.color.setHex(0xffd700);
          line.material.opacity = 0.9;
          
          // 연결된 노드 인덱스 저장
          const connectedIdx = from === selectedIdx ? to : from;
          connectedIndices.push(connectedIdx);
          
          // 연결된 노드 강조
          const connectedMesh = nodeMeshes[connectedIdx];
          connectedMesh.material.emissiveIntensity = 1.0;
          connectedMesh.scale.set(1.15, 1.15, 1.15);
        }
      });
      
      // 연결된 전문가 목록 표시
      if (connectedIndices.length > 0) {
        const connectedExperts = connectedIndices
          .map(idx => nodes[idx])
          .filter(n => n.type === 'expert')
          .map(n => n.name);
        
        if (connectedExperts.length > 0) {
          infoText += `<br><br><span style="color: #ffd700;">🔗 연결된 전문가:</span><br>`;
          connectedExperts.forEach(name => {
            infoText += `⭐ ${name}<br>`;
          });
        }
      }
      
      if (data.type === 'node') {
        if (myUniverse.has(selectedIdx)) {
          infoText += `<br><span style="color: #00ff88;">✓ 내 우주에 추가됨</span>`;
        }
      }
      
      document.getElementById('node-info').innerHTML = infoText;
    } else {
      // 빈 공간 클릭시 기본 메시지
      document.getElementById('node-info').innerHTML = '노드를 클릭해서 상세 정보를 확인하세요';
    }
  }
});

// 3D 좌표를 화면 좌표로 변환
function toScreenPosition(obj, camera) {
  const vector = new THREE.Vector3();
  const widthHalf = window.innerWidth / 2;
  const heightHalf = window.innerHeight / 2;
  
  obj.updateMatrixWorld();
  vector.setFromMatrixPosition(obj.matrixWorld);
  vector.project(camera);
  
  vector.x = (vector.x * widthHalf) + widthHalf;
  vector.y = -(vector.y * heightHalf) + heightHalf;
  
  return { x: vector.x, y: vector.y, z: vector.z };
}

// 애니메이션
let lastLabelUpdate = 0;

function animate() {
  requestAnimationFrame(animate);
  
  // 자동 회전 (마우스 드래그 없을 때)
  if (!isDragging) {
    rotation.y += 0.001;
  }
  
  // 라벨 업데이트를 200ms마다 진행 (throttle)
  const now = Date.now();
  if (now - lastLabelUpdate > 200) {
    lastLabelUpdate = now;
    
    nodeMeshes.forEach((mesh, idx) => {
      const pos = toScreenPosition(mesh, camera);
      const label = nodeLabels[idx];
      
      // 카메라 앞에 있을 때만 표시
      if (pos.z < 1) {
        label.style.display = 'block';
        label.style.left = pos.x + 'px';
        label.style.top = (pos.y - 25) + 'px';
      } else {
        label.style.display = 'none';
      }
    });
  }
  
  // 노드 회전 줄임 (선택된 노드만 회전)
  nodeMeshes.forEach((mesh) => {
    if (mesh.scale.x > 1.05) { // 선택/강조된 노드만 회전
      mesh.rotation.y += 0.02;
      mesh.rotation.x += 0.01;
    }
  });
  
  // 카메라 위치 업데이트
  const distance = camera.position.z;
  camera.position.x = Math.sin(rotation.y) * distance * 0.1;
  camera.position.y = Math.sin(rotation.x) * distance * 0.1;
  camera.lookAt(scene.position);
  
  stars.rotation.y += 0.0002;
  
  renderer.render(scene, camera);
}

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
