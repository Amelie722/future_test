<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Universe - 3D 네트워크</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Malgun Gothic', sans-serif; 
  background: #0a0a0a; 
  color: #fff;
  overflow: hidden;
}
#canvas-container { 
  width: 100vw; 
  height: 100vh; 
  position: relative;
}
#info-panel {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(20, 20, 40, 0.9);
  padding: 20px;
  border-radius: 12px;
  max-width: 320px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
}
#info-panel h2 {
  font-size: 18px;
  margin-bottom: 8px;
  color: #ffd700;
}
#info-panel p {
  font-size: 13px;
  line-height: 1.6;
  color: #ccc;
  margin-bottom: 6px;
}
#my-universe-panel {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(40, 20, 60, 0.9);
  padding: 20px;
  border-radius: 12px;
  max-width: 280px;
  border: 2px solid rgba(255, 215, 0, 0.3);
  backdrop-filter: blur(10px);
}
#my-universe-panel h2 {
  font-size: 16px;
  margin-bottom: 12px;
  color: #ffd700;
  text-align: center;
}
#clicked-nodes {
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 12px;
}
.clicked-node-item {
  background: rgba(255, 215, 0, 0.1);
  padding: 6px 10px;
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 12px;
  color: #ffd700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.remove-btn {
  background: rgba(255, 100, 100, 0.5);
  border: none;
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}
.remove-btn:hover {
  background: rgba(255, 100, 100, 0.8);
}
#view-universe-btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 8px;
}

  font-weight: bold;
  font-size: 12px;
  margin-bottom: 8px;
  text-align: center;

}

  margin-bottom: 8px;
  padding: 8px 10px;

  line-height: 1.4;
  text-align: center;

  left: 50%;

  font-size: 13px;
  color: #aaa;

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.parent.postMessage({
  isStreamlitMessage: true,
  type: 'streamlit:componentReady',
  apiVersion: 1
}, '*');

function updateStreamlitFrameHeight() {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: 'streamlit:setFrameHeight',
    height: Math.max(document.documentElement.scrollHeight || 0, window.innerHeight || 760, 760)
  }, '*');
}
window.addEventListener('load', updateStreamlitFrameHeight);
window.addEventListener('resize', updateStreamlitFrameHeight);

// Scene 설정
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

const camera = new THREE.PerspectiveCamera(110, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 18;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a0a);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// 별 배경 만들기
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];
for (let i = 0; i < 1000; i++) {
  const x = (Math.random() - 0.5) * 100;
  const y = (Math.random() - 0.5) * 100;
  const z = (Math.random() - 0.5) * 100;
  starVertices.push(x, y, z);
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// 전문가, 노드, 연결선은 하나의 그룹으로 묶어 안정적으로 회전시킵니다.

scene.add(universeGroup);

// 별 모양 geometry 생성 함수
function createStarGeometry(size) {
  const outerRadius = size;
  const innerRadius = size * 0.4;
  const points = 5;
  const shape = new THREE.Shape();
  
  for (let i = 0; i < points * 2; i++) {
    const angle = -Math.PI / 2 + (Math.PI / points) * i;
    const radius = i % 2 === 0 ? outerRadius : innerRadius;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    if (i === 0) {
      shape.moveTo(x, y);
    } else {
      shape.lineTo(x, y);
    }
  }
  shape.closePath();
  
  const geometry = new THREE.ExtrudeGeometry(shape, {
    depth: size * 0.22,
    bevelEnabled: true,
    bevelThickness: size * 0.035,
    bevelSize: size * 0.035,
    bevelSegments: 1
  });
  geometry.center();
  geometry.computeVertexNormals();
  
  return geometry;
}

// 노드 메쉬 생성
const nodeMeshes = [];
const nodeLabels = [];

nodes.forEach((node, idx) => {
  let geometry;
  
  // 전문가는 별 모양, 노드는 구체
  if (node.type === 'expert') {
    geometry = createStarGeometry(node.size);
  } else {
    geometry = new THREE.SphereGeometry(node.size, 16, 16);
  }
  
  const material = new THREE.MeshPhongMaterial({ 
    color: node.color,
    emissive: node.color,
    emissiveIntensity: node.type === 'expert' ? 0.6 : 0.3,
    shininess: 30,
    transparent: true,
    opacity: 1
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(node.pos[0], node.pos[1], node.pos[2]);
  mesh.userData = { index: idx, name: node.name, desc: node.desc, type: node.type, baseColor: node.color };
  universeGroup.add(mesh);
  nodeMeshes.push(mesh);
  
  // 라벨 생성
  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = node.name;
  label.style.display = 'none';
  document.body.appendChild(label);
  nodeLabels.push(label);
});

// 연결선 생성
const connectionLines = [];
connections.forEach(([from, to]) => {
  const points = [
    new THREE.Vector3(...nodes[from].pos),
    new THREE.Vector3(...nodes[to].pos)
  ];
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ 
    color: 0x666666, 
    opacity: 0.3, 
    transparent: true,
    linewidth: 1
  });
  const line = new THREE.Line(geometry, material);
  line.userData = { from: from, to: to };
  universeGroup.add(line);
  connectionLines.push(line);
});

function arrangeNodesAroundCenter() {
  savedNodePositions.clear();
  const indices = [...myUniverse];
  const n = indices.length;
  const radius = 5.5;
  indices.forEach((idx, i) => {
    savedNodePositions.set(idx, nodeMeshes[idx].position.clone());
    const phi   = Math.acos(1 - 2 * (i + 0.5) / n);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    nodeMeshes[idx].position.set(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.sin(phi) * Math.sin(theta),
      radius * Math.cos(phi)
    );
  });
}

function buildMyUniverseGraph() {
  const connectedExperts = new Set();
  const expertParentMap = new Map();

  myUniverse.forEach(nodeIdx => {
    connectionLines.forEach(line => {
      const { from, to } = line.userData;
      let expertIdx = null;
      if (from === nodeIdx && nodes[to].type === 'expert') expertIdx = to;
      if (to === nodeIdx && nodes[from].type === 'expert') expertIdx = from;

      if (expertIdx !== null) {
        connectedExperts.add(expertIdx);
        if (!expertParentMap.has(expertIdx)) {
          expertParentMap.set(expertIdx, nodeIdx);
        }
      }
    });
  });

  return { connectedExperts, expertParentMap };
}

// 전문가는 자신을 대표하는 활동분야 구 뒤쪽에 계층적으로 배치
function arrangeExpertsOutside(expertParentMap) {
  const expertsByParent = new Map();
  expertParentMap.forEach((parentIdx, expertIdx) => {
    if (!expertsByParent.has(parentIdx)) expertsByParent.set(parentIdx, []);
    expertsByParent.get(parentIdx).push(expertIdx);
  });

  expertsByParent.forEach((expertIndices, parentIdx) => {
    const parentPos = nodeMeshes[parentIdx].position.clone();
    const dir = parentPos.clone().normalize();
    if (dir.lengthSq() === 0) dir.set(1, 0, 0);

    const up = Math.abs(dir.y) > 0.85 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
    const tangent = new THREE.Vector3().crossVectors(dir, up).normalize();
    const bitangent = new THREE.Vector3().crossVectors(dir, tangent).normalize();
    const baseDistance = parentPos.length() + 4.2;
    const spread = expertIndices.length > 1 ? 1.15 : 0;

    expertIndices.forEach((expertIdx, i) => {
      savedNodePositions.set(expertIdx, nodeMeshes[expertIdx].position.clone());
      const angle = (Math.PI * 2 * i) / Math.max(expertIndices.length, 1);
      const offset = tangent.clone().multiplyScalar(Math.cos(angle) * spread)
        .add(bitangent.clone().multiplyScalar(Math.sin(angle) * spread));
      const expertPos = dir.clone().multiplyScalar(baseDistance).add(offset);
      nodeMeshes[expertIdx].position.copy(expertPos);
    });
  });
}

function restoreNodePositions() {
  savedNodePositions.forEach((pos, idx) => nodeMeshes[idx].position.copy(pos));
  savedNodePositions.clear();
}

// '나' → 선택 노드 연결선
function buildMyUniverseLines() {
  clearMyUniverseLines();
  myUniverse.forEach(idx => {
    const p = nodeMeshes[idx].position;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(p.x, p.y, p.z)
    ]);
    const mat = new THREE.LineBasicMaterial({ color: 0xFFD700, opacity: 0.75, transparent: true });
    const line = new THREE.Line(geo, mat);
    line.userData = { nodeIdx: idx };
    universeGroup.add(line);
    myUniverseLines.push(line);
  });
}

function clearMyUniverseLines() {
  myUniverseLines.forEach(l => { universeGroup.remove(l); l.geometry.dispose(); l.material.dispose(); });
  myUniverseLines = [];
}

// 선택 노드 → 전문가 연결선 (나와 전문가는 직접 연결하지 않음)
function buildMyExpertLines(expertParentMap) {
  clearMyExpertLines();
  expertParentMap.forEach((parentIdx, expertIdx) => {
    const p1 = nodeMeshes[parentIdx].position;
    const p2 = nodeMeshes[expertIdx].position;
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(p1.x, p1.y, p1.z),
      new THREE.Vector3(p2.x, p2.y, p2.z)
    ]);
    const mat = new THREE.LineBasicMaterial({ color: 0xffd700, opacity: 0.55, transparent: true });
    const newLine = new THREE.Line(geo, mat);
    newLine.userData = { parentIdx, expertIdx };
    universeGroup.add(newLine);
    myExpertLines.push(newLine);
  });
}

function clearMyExpertLines() {
  myExpertLines.forEach(l => { universeGroup.remove(l); l.geometry.dispose(); l.material.dispose(); });
  myExpertLines = [];
}

// 마우스 컨트롤
let isDragging = false;
let dragButton = 0;
let previousMousePosition = { x: 0, y: 0 };
let rotation = { x: 0, y: 0 };
let panOffset = { x: 0, y: 0 };
const rotationSpeed = 0.006;
const panSpeed = 0.012;

renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragButton = e.button;
  previousMousePosition = { x: e.clientX, y: e.clientY };
  renderer.domElement.style.cursor = dragButton === 2 ? 'move' : 'grabbing';
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const deltaX = e.clientX - previousMousePosition.x;
  const deltaY = e.clientY - previousMousePosition.y;

  if (dragButton === 2) {
    // 우클릭: 카메라 패닝 (화면 기준)
    const scale = camera.position.z * panSpeed * 0.05;
    panOffset.x -= deltaX * scale;
    panOffset.y += deltaY * scale;
  } else {
    // 좌클릭: 회전
    rotation.y += deltaX * rotationSpeed;
    rotation.x += deltaY * rotationSpeed;
    rotation.x = Math.max(-Math.PI / 2.4, Math.min(Math.PI / 2.4, rotation.x));
  }

  previousMousePosition = { x: e.clientX, y: e.clientY };
});

function stopDragging() {
  isDragging = false;
  renderer.domElement.style.cursor = 'grab';
}

renderer.domElement.style.cursor = 'grab';
renderer.domElement.addEventListener('mouseup', stopDragging);
renderer.domElement.addEventListener('mouseleave', stopDragging);
window.addEventListener('mouseup', stopDragging);

// 줌
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camera.position.z += e.deltaY * 0.01;
  camera.position.z = Math.max(5, Math.min(30, camera.position.z));
});

// 클릭한 노드 추적
const myUniverse = new Set();
let isMyUniverseMode = false;

function updateMyUniversePanel() {
  const container = document.getElementById('clicked-nodes');
  const viewBtn = document.getElementById('view-universe-btn');
  const saveBtn = document.getElementById('save-universe-btn');
  const clearBtn = document.getElementById('clear-universe-btn');
  const stats = document.getElementById('universe-stats');
  
  if (myUniverse.size === 0) {
    container.innerHTML = '<p style="color: #888; font-size: 11px; text-align: center;">노드를 클릭하면 여기에 추가됩니다</p>';
    viewBtn.style.display = 'none';
    saveBtn.style.display = 'none';
    clearBtn.style.display = 'none';
    stats.innerHTML = '';
    return;
  }
  
  // 클릭한 노드 목록 표시
  let html = '';
  myUniverse.forEach(idx => {
    const node = nodes[idx];
    if (node.type === 'node') {
      html += `
        <div class="clicked-node-item">
          <span>🌟 ${node.name}</span>
          <button class="remove-btn" onclick="removeFromUniverse(${idx})">✕</button>
        </div>
      `;
    }
  });
  container.innerHTML = html;
  
  viewBtn.style.display = 'block';
  saveBtn.style.display = 'block';
  clearBtn.style.display = 'block';
  
  const { connectedExperts } = buildMyUniverseGraph();
  stats.innerHTML = `
    <div>활동분야 노드: ${myUniverse.size}개</div>
    <div>연결 전문가: ${connectedExperts.size}명</div>
  `;
}

function removeFromUniverse(idx) {
  myUniverse.delete(idx);
  updateMyUniversePanel();
  if (!isMyUniverseMode) {
    resetHighlight();
  }
}

document.getElementById('clear-universe-btn').addEventListener('click', () => {
  myUniverse.clear();
  updateMyUniversePanel();
  exitMyUniverseMode();
});

document.getElementById('view-universe-btn').addEventListener('click', () => {
  toggleMyUniverseMode();
});

function saveMyUniverseToStreamlit() {
  const selectedNames = [...myUniverse]
    .map(idx => nodes[idx])
    .filter(node => node && node.type === 'node')
    .map(node => node.name);

  if (!window.parent) return false;
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: 'streamlit:setComponentValue',
    value: {
      type: 'save_universe',
      nodes: selectedNames,
      nonce: Date.now()
    }
  }, '*');
  return true;
}

document.getElementById('save-universe-btn').addEventListener('click', (event) => {
  const feedback = document.getElementById('save-feedback');
  if (feedback) {
    feedback.style.display = 'block';
    feedback.textContent = `${myUniverse.size}개 노드를 저장 중입니다...`;
  }
  if (!saveMyUniverseToStreamlit()) {
    event.preventDefault();
    if (feedback) {
      feedback.textContent = '저장 요청을 만들지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.';
    }
  }
});

function toggleMyUniverseMode() {
  isMyUniverseMode = !isMyUniverseMode;
  const btn = document.getElementById('view-universe-btn');
  
  if (isMyUniverseMode) {
    btn.textContent = '전체 네트워크 보기 🌐';
    showMyUniverse();
  } else {
    btn.textContent = '내 우주 보기 🚀';
    exitMyUniverseMode();
  }
}

function showMyUniverse() {
  buildMyStar();

  // 1) 선택 노드를 내 별 주위 안쪽 구면에 배치
  arrangeNodesAroundCenter();

  // 2) 선택 노드와 연결된 전문가를 함께 계산
  const { connectedExperts, expertParentMap } = buildMyUniverseGraph();
  currentMyConnectedExperts = connectedExperts;
  currentMyExpertParentMap = expertParentMap;

  // 3) 전문가는 자신을 대표하는 활동분야 노드 바깥에 배치
  arrangeExpertsOutside(expertParentMap);

  // 4) 나만의 우주에서는 선택 활동분야 노드와 연결 전문가만 표시
  nodeMeshes.forEach((mesh, idx) => {
    if (myUniverse.has(idx)) {
      mesh.visible = true;
      mesh.material.color.setHex(mesh.userData.baseColor);
      mesh.material.emissive.setHex(mesh.userData.baseColor);
      mesh.material.emissiveIntensity = 1.45;
      mesh.material.opacity = 1;
      mesh.scale.set(1.28, 1.28, 1.28);
    } else if (connectedExperts.has(idx)) {
      mesh.visible = true;
      mesh.material.color.setHex(mesh.userData.baseColor);
      mesh.material.emissive.setHex(mesh.userData.baseColor);
      mesh.material.emissiveIntensity = 1.1;
      mesh.material.opacity = 1;
      mesh.scale.set(1.12, 1.12, 1.12);
    } else {
      mesh.visible = false;
      nodeLabels[idx].style.display = 'none';
    }
  });

  // 5) 기존 연결선은 모두 숨기고 나만의 우주용 선만 그림
  connectionLines.forEach(line => { line.visible = false; });

  // 6) 중앙 '나' 별 표시
  myStar.visible = true;

  // 7) '나' → 선택 활동분야 노드, 선택 노드 → 전문가 연결선
  buildMyUniverseLines();
  buildMyExpertLines(expertParentMap);

  document.getElementById('node-info').innerHTML =
    `<strong>내 우주 모드</strong><br>저장한 활동분야 노드와 연결 전문가 ${connectedExperts.size}명이 표시됩니다`;
}

function exitMyUniverseMode() {
  isMyUniverseMode = false;
  currentMyConnectedExperts = new Set();
  currentMyExpertParentMap = new Map();

  // 중앙 별 및 동적 연결선 정리
  restoreNodePositions();
  clearMyUniverseLines();
  clearMyExpertLines();
  if (myStar)      { myStar.visible = false; }
  if (myStarLabel) { myStarLabel.style.display = 'none'; }

  // 모든 노드와 연결선 복원 (전체 네트워크)
  nodeMeshes.forEach(mesh => { mesh.visible = true; });
  connectionLines.forEach(line => {
    line.visible = true;
    line.material.color.setHex(0x666666);
    line.material.opacity = 0.3;
  });

  resetHighlight();
  document.getElementById('node-info').innerHTML = '노드를 클릭해서 상세 정보를 확인하세요';
}

function resetHighlight() {
  nodeMeshes.forEach(m => {
    m.material.color.setHex(m.userData.baseColor);
    m.material.emissive.setHex(m.userData.baseColor);
    m.material.emissiveIntensity = m.userData.type === 'expert' ? 0.6 : 0.3;
    m.material.opacity = 1;
    m.scale.set(1, 1, 1);
  });
  connectionLines.forEach(line => {
    line.visible = true;
    line.material.color.setHex(0x666666);
    line.material.opacity = 0.3;
  });
}

function focusDirectConnections(selectedIdx) {
  const focused = new Set([selectedIdx]);
  const directLines = new Set();

  connectionLines.forEach((line, lineIdx) => {
    const { from, to } = line.userData;
    if (from === selectedIdx || to === selectedIdx) {
      directLines.add(lineIdx);
      focused.add(from === selectedIdx ? to : from);
    }
  });

  nodeMeshes.forEach((mesh, idx) => {
    if (focused.has(idx)) {
      mesh.material.color.setHex(mesh.userData.baseColor);
      mesh.material.emissive.setHex(mesh.userData.baseColor);
      mesh.material.emissiveIntensity = idx === selectedIdx ? 1.25 : 0.95;
      mesh.material.opacity = 1;
      mesh.scale.set(idx === selectedIdx ? 1.3 : 1.15, idx === selectedIdx ? 1.3 : 1.15, idx === selectedIdx ? 1.3 : 1.15);
    } else {
      mesh.material.color.setHex(0x5d6472);
      mesh.material.emissive.setHex(0x1a1d24);
      mesh.material.emissiveIntensity = 0.08;
      mesh.material.opacity = 0.28;
      mesh.scale.set(0.9, 0.9, 0.9);
    }
  });

  connectionLines.forEach((line, lineIdx) => {
    if (directLines.has(lineIdx)) {
      line.visible = true;
      line.material.color.setHex(0xffd700);
      line.material.opacity = 0.95;
    } else {
      line.visible = true;
      line.material.color.setHex(0x343844);
      line.material.opacity = 0.07;
    }
  });

  return [...focused].filter(idx => idx !== selectedIdx);
}

// 클릭 이벤트
const raycaster = new THREE.Raycaster();
function getNodeInfoText(selectedIdx) {
  const data = nodeMeshes[selectedIdx].userData;
  let infoText = data.desc
    ? `<strong>${data.name}</strong><br>${data.desc}`
    : `<strong>${data.name}</strong><br>이 노드와 연결된 전문가를 탐색하세요.`;

  if (isMyUniverseMode) {
    if (data.type === 'expert') {
      const parentIdx = currentMyExpertParentMap.get(selectedIdx);
      if (parentIdx !== undefined) {
        infoText += `<br><br><span style="color:#ffd700;">연결된 관심 노드</span><br>• ${nodes[parentIdx].name}`;
      }
    } else {
      const relatedExperts = [];
      currentMyExpertParentMap.forEach((parentIdx, expertIdx) => {
        if (parentIdx === selectedIdx) relatedExperts.push(nodes[expertIdx].name);
      });
      if (relatedExperts.length > 0) {
        infoText += `<br><br><span style="color:#ffd700;">연결된 전문가</span><br>`;
        relatedExperts.forEach(name => { infoText += `• ${name}<br>`; });
      }
      if (myUniverse.has(selectedIdx)) {
        infoText += `<br><span style="color:#00ff88;">내 우주에 저장된 관심 노드</span>`;
      }
    }
  }

  return infoText;
}

function focusMyUniverseSelection(selectedIdx) {
  nodeMeshes.forEach((mesh, idx) => {
    if (!mesh.visible) return;
    const isSelected = idx === selectedIdx;
    const scale = isSelected ? 1.42 : (mesh.userData.type === 'expert' ? 1.08 : 1.18);
    mesh.material.color.setHex(mesh.userData.baseColor);
    mesh.material.emissive.setHex(mesh.userData.baseColor);
    mesh.material.emissiveIntensity = isSelected ? 1.55 : (mesh.userData.type === 'expert' ? 1.0 : 1.25);
    mesh.material.opacity = isSelected ? 1 : 0.72;
    mesh.scale.set(scale, scale, scale);
  });

  connectionLines.forEach(line => { line.visible = false; });

  myUniverseLines.forEach(line => {
    const highlighted = line.userData && line.userData.nodeIdx === selectedIdx;
    line.material.color.setHex(0xFFD700);
    line.material.opacity = highlighted ? 0.95 : 0.35;
  });

  myExpertLines.forEach(line => {
    const parentIdx = line.userData ? line.userData.parentIdx : undefined;
    const expertIdx = line.userData ? line.userData.expertIdx : undefined;
    const highlighted = parentIdx === selectedIdx || expertIdx === selectedIdx;
    line.material.color.setHex(highlighted ? 0xfff2a8 : 0xffd700);
    line.material.opacity = highlighted ? 0.95 : 0.28;
  });
}

const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (isDragging) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  
  if (!isMyUniverseMode) {
    // 일반 모드에서의 클릭
    if (intersects.length > 0) {
      // 모든 노드와 선을 기본 상태로 리셋한 뒤 1-hop 연결만 포커스
      resetHighlight();
      const selected = intersects[0].object;
      const data = selected.userData;
      const selectedIdx = data.index;
      
      // 노드만 나만의 우주에 추가 (전문가는 제외)
      if (data.type === 'node') {
        if (myUniverse.has(selectedIdx)) {
          myUniverse.delete(selectedIdx);
        } else {
          myUniverse.add(selectedIdx);
        }
        updateMyUniversePanel();
      }
      
      // 정보 패널 업데이트
      let infoText = data.desc ? 
        `<strong>${data.name}</strong><br>${data.desc}` :
        `<strong>${data.name}</strong><br>이 노드와 연결된 전문가를 탐색하세요`;
      
      // 선택 노드와 직접 연결된 노드/선만 밝게 표시하고 나머지는 흑백 처리
      const connectedIndices = focusDirectConnections(selectedIdx);
      
      // 연결된 전문가 목록 표시
      if (connectedIndices.length > 0) {
        const connectedExperts = connectedIndices
          .map(idx => nodes[idx])
          .filter(n => n.type === 'expert')
          .map(n => n.name);
        
        if (connectedExperts.length > 0) {
          infoText += `<br><br><span style="color: #ffd700;">🔗 연결된 전문가:</span><br>`;
          connectedExperts.forEach(name => {
            infoText += `⭐ ${name}<br>`;
          });
        }
      }
      
      if (data.type === 'node') {
        if (myUniverse.has(selectedIdx)) {
          infoText += `<br><span style="color: #00ff88;">✓ 내 우주에 추가됨</span>`;
        }
      }
      
      document.getElementById('node-info').innerHTML = infoText;
    } else {
      // 빈 공간 클릭시 전체 네트워크 밝기 복원
      resetHighlight();
      document.getElementById('node-info').innerHTML = '노드를 클릭해서 상세 정보를 확인하세요';
    }
  } else {
    const visibleIntersects = intersects.filter(item => item.object.visible);
    if (visibleIntersects.length > 0) {
      const selected = visibleIntersects[0].object;
      const selectedIdx = selected.userData.index;
      focusMyUniverseSelection(selectedIdx);
      document.getElementById('node-info').innerHTML = getNodeInfoText(selectedIdx);
    } else {
      document.getElementById('node-info').innerHTML =
        `<strong>내 우주 모드</strong><br>관심 노드나 연결된 전문가 노드를 클릭하면 상세 정보를 볼 수 있습니다.`;
    }
  }
});

// 3D 좌표를 화면 좌표로 변환
function toScreenPosition(obj, camera) {
  const vector = new THREE.Vector3();
  const widthHalf = window.innerWidth / 2;
  const heightHalf = window.innerHeight / 2;
  
  obj.updateMatrixWorld();
  vector.setFromMatrixPosition(obj.matrixWorld);
  vector.project(camera);
  
  vector.x = (vector.x * widthHalf) + widthHalf;
  vector.y = -(vector.y * heightHalf) + heightHalf;
  
  return { x: vector.x, y: vector.y, z: vector.z };
}

// 애니메이션
let lastLabelUpdate = 0;

function animate() {
  requestAnimationFrame(animate);
  
  // 자동 회전 (마우스 드래그 없을 때)
  if (!isDragging) {
    rotation.y += 0.0004;
  }
  universeGroup.rotation.x = rotation.x;
  universeGroup.rotation.y = rotation.y;
  
  // 라벨 업데이트를 200ms마다 진행 (throttle)
  const now = Date.now();
  if (now - lastLabelUpdate > 200) {
    lastLabelUpdate = now;
    
    nodeMeshes.forEach((mesh, idx) => {
      const label = nodeLabels[idx];

      if (!mesh.visible) {
        label.style.display = 'none';
        return;
      }

      // 내 우주 모드: 강조된 노드만 라벨 표시
      // 전체 네트워크 모드: 모든 노드 라벨 표시
      if (isMyUniverseMode && mesh.scale.x <= 1.05) {
        label.style.display = 'none';
        return;
      }

      const pos = toScreenPosition(mesh, camera);
      if (pos.z < 1) {
        label.style.display = 'block';
        label.style.left = pos.x + 'px';
        label.style.top = (pos.y - 25) + 'px';
      } else {
        label.style.display = 'none';
      }
    });

    // 중앙 '나' 별 라벨 위치 갱신
    if (myStar && myStar.visible && myStarLabel) {
      const pos = toScreenPosition(myStar, camera);
      if (pos.z < 1) {
        myStarLabel.style.display = 'block';
        myStarLabel.style.left = pos.x + 'px';
        myStarLabel.style.top = (pos.y - 38) + 'px';
      } else {
        myStarLabel.style.display = 'none';
      }
    }
  }
  
  // 노드 회전 줄임 (선택된 노드만 회전)
  nodeMeshes.forEach((mesh) => {
    if (mesh.scale.x > 1.05) {
      mesh.rotation.y += 0.02;
      mesh.rotation.x += 0.01;
    }
  });

  // 중앙 '나' 별 회전
  if (myStar && myStar.visible) {
    myStar.rotation.y += 0.025;
    myStar.rotation.x += 0.008;
  }
  
  // 카메라는 고정하고 우주 그룹 자체를 회전시켜 드래그 방향을 안정화합니다.
  camera.position.x = panOffset.x;
  camera.position.y = panOffset.y;
  camera.lookAt(panOffset.x, panOffset.y, 0);
  
  stars.rotation.y += 0.0002;
  
  renderer.render(scene, camera);
}

// 반응형
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>

<script>
(function() {
  const _savedNames = [];
  function _loadSaved() {
    myUniverse.clear();
    _savedNames.forEach(function(name) {
      const idx = nodes.findIndex(function(n) { return n.name === name && n.type === 'node'; });
      if (idx !== -1) myUniverse.add(idx);
    });
    updateMyUniversePanel();

    if (myUniverse.size > 0) {
      isMyUniverseMode = true;
      const btn = document.getElementById('view-universe-btn');
      if (btn) btn.textContent = '전체 네트워크 보기 🌐';
      showMyUniverse();
    } else if (typeof exitMyUniverseMode === 'function') {
      exitMyUniverseMode();
    }
  }
  if (typeof nodes !== 'undefined' && typeof showMyUniverse === 'function') {
    _loadSaved();
  } else {
    window.addEventListener('load', _loadSaved);
  }
})();
</script>

</body>
</html>
